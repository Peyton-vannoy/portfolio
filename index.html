<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=DM+Sans:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
    <title>Peyton.dev</title>
  </head>
  <body>
    <header class="header">
      <nav class="nav">
        <img class="nav__logo" src="" alt="logo" />
        <ul class="nav__list">
          <li class="nav__item">
            <a class="nav__link" href="#about">About</a>
          </li>
          <li class="nav__item"><a class="nav__link" href="#work">Work</a></li>
          <li class="nav__item">
            <a class="nav__link" href="#skills">Skills</a>
          </li>
          <li class="nav__item">
            <a class="nav__link" href="#contact">Contact</a>
          </li>
        </ul>
      </nav>
    </header>
    <main class="main">
      <section class="hero">
        <div class="hero__container">
          <p class="hero__eyebrow">Full-Stack Developer</p>
          <h1 class="hero__title">
            Hi, I'm <span class="hero__title-name">Peyton</span>
          </h1>
          <p class="hero__description">
            I'm a full-stack developer with a passion for building web
            applications.
          </p>
          <div class="hero__cta-container">
            <a class="hero__cta" href="#work">View my work</a>
            <a class="hero__cta hero__cta--secondary" href="#contact"
              >Contact me</a
            >
          </div>
        </div>
      </section>

      <section class="about" id="about">
        <div class="about__container">
          <h2 class="about__eyebrow">About</h2>
          <div class="about__grid">
            <img
              class="about__image"
              src="https://placehold.co/300x300"
              alt="about"
            />
            <div class="about__content">
              <p class="about__description">
                I'm a full-stack developer with a passion for building web
                applications.
              </p>
            </div>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
